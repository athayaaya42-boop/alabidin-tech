<div class="container py-5">

            <button class="btn btn-primary" onclick= "addProduct('Mouse', 150000)">Buy</button>

<!-- PURCHASE DETAILS -->
<div class="row mt-5">
      <div class="col-md-8 mx-auto">
        <div class="sumarry-box">
            <h4>Purchase Details</h4>
            <div id="itemList"></div>
            <hr>
            <h5>Total Price:</h5>
            <h3 id="totalPrice">Rp 0</h3>
            <button class="btn btn-success w-100 mt-3" onclick="payNow()">Pay Now</button>
        </div>
    </div>
</div>

</div>

<script>
   let cart = {};
   let total = 0;
   
   let itemList = document.getElementById("itemList");
   let totalPrice = document.getElementById("totalPrice");

   function addProduct(name, price) {
    if (cart[name]) {
        cart[name].qty +=1;
    } else {
        cart[name] = {
            qty:1,
            price: price
        };
    }
    total += price;
    updateCart() 
   }

   function updateCart() {
    itemList.innerHTML ="";
    for (let item in cart) {
        let div = document.createElement("div");
        div.innerHTML = `
           <strong>${item}</strong>
           x${cart[item].qty}
           = Rp ${(cart[item].qty * cart[item].price).toLocaleString()}
        `;
        itemList.appendChild(div);
    }
    totalPrice.innerText = "Rp " + total.toLocaleString();
   }
   function payNow() {
    alert("Thank you for your purchase!");
   }
</script>
