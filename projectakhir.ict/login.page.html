<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Abidin Tech International</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
    
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(#0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            width:100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
    </style>
</head>

<div class="login-card text-center">  
    <h3 class="fw-bold mb-2">Abidin Tech International</h3>
    <p class="mb-4">Login to continue</p>
    <input type="text" id="username" class="form-control mb-3" placeholder="Username">
    <input type="password" id="password" class="form1e-control mb-3" placeholder="Password">
    <button class="btn btn-primary w-100" onclick="login()">Login</button>
    <p class="text-danger mt-3" id="message"></p>
</div>

<script>
    localStorage.setItem("username", "student");
    localStorage.setItem("password", "12345");

    function login() {
        let inputUsername = document.getElementById("username").value;
        let inputPassword = document.getElementById("password").value;

        let savedUsername = localStorage.getItem("username");
        let savedPassword = localStorage.getItem("password");

        if (inputUsername === savedUsername && inputPassword === savedPassword) {
            window.location.href = "home.page.html";
        } else {
            document.getElementById("message").innerText =
                "Username or password is incorrect!";
        }
    }
</script>
</body>
</html>
